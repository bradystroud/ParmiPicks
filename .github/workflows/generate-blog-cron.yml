name: Generate Blog

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: "0 0 * * 1" # Runs every Monday at midnight (optional)

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "openai>=2.44" python-dotenv pydantic

      - name: Run Python script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_blog.py

      - name: Set unique branch name
        id: set_branch
        run: echo "BRANCH_NAME=new-blog-post-$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "New blog post: ${{ env.BLOG_TITLE }}"
          title: "New blog post: ${{ env.BLOG_TITLE }}"
          body: "This PR adds “${{ env.BLOG_TITLE }}”, generated by the GitHub Action using OpenAI API"
          branch: "${{ env.BRANCH_NAME }}"
